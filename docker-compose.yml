version: "3.8"

services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=gemma4:latest
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - legal-net

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=gemma4:latest
    command: ["uvicorn", "src.case_researcher.api:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - legal-net

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - legal-net

volumes:
  ollama-data:

networks:
  legal-net:
    driver: bridge
