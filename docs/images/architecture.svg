<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a574"/>
      <stop offset="100%" style="stop-color:#e8c89e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="18" fill="url(#gold)" text-anchor="middle" font-weight="bold">System Architecture</text>

  <!-- User -->
  <rect x="330" y="55" width="140" height="45" rx="8" fill="#2e7d32" stroke="#4caf50" stroke-width="1.5"/>
  <text x="400" y="83" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">👤 User</text>

  <!-- Arrows from User -->
  <line x1="360" y1="100" x2="160" y2="150" stroke="#d4a574" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="100" x2="400" y2="150" stroke="#d4a574" stroke-width="1.5"/>
  <line x1="440" y1="100" x2="640" y2="150" stroke="#d4a574" stroke-width="1.5"/>

  <!-- CLI -->
  <rect x="80" y="150" width="160" height="50" rx="8" fill="#1565c0" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="160" y="180" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">🖥️ CLI (Click + Rich)</text>

  <!-- Web UI -->
  <rect x="320" y="150" width="160" height="50" rx="8" fill="#6a1b9a" stroke="#ab47bc" stroke-width="1.5"/>
  <text x="400" y="180" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">🌐 Web UI (Streamlit)</text>

  <!-- API -->
  <rect x="560" y="150" width="160" height="50" rx="8" fill="#e65100" stroke="#ff9800" stroke-width="1.5"/>
  <text x="640" y="180" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">🔌 API (FastAPI)</text>

  <!-- Arrows to Core -->
  <line x1="160" y1="200" x2="400" y2="260" stroke="#d4a574" stroke-width="1.5"/>
  <line x1="400" y1="200" x2="400" y2="260" stroke="#d4a574" stroke-width="1.5"/>
  <line x1="640" y1="200" x2="400" y2="260" stroke="#d4a574" stroke-width="1.5"/>

  <!-- Core Engine -->
  <rect x="270" y="260" width="260" height="55" rx="10" fill="#b71c1c" stroke="#ef5350" stroke-width="2"/>
  <text x="400" y="283" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">⚖️ Core Research Engine</text>
  <text x="400" y="303" font-family="Arial, sans-serif" font-size="11" fill="#ffcdd2" text-anchor="middle">Research • Precedents • Analysis • Citations</text>

  <!-- Arrow to Ollama -->
  <line x1="400" y1="315" x2="400" y2="345" stroke="#d4a574" stroke-width="2"/>

  <!-- Ollama -->
  <rect x="290" y="345" width="220" height="45" rx="8" fill="#004d40" stroke="#26a69a" stroke-width="2"/>
  <text x="400" y="372" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">🦙 Ollama — Gemma 4</text>

  <!-- Privacy box -->
  <rect x="600" y="340" width="170" height="50" rx="8" fill="#1b5e20" stroke="#4caf50" stroke-width="1" opacity="0.9"/>
  <text x="685" y="361" font-family="Arial, sans-serif" font-size="11" fill="#81c784" text-anchor="middle">🔒 100% Local</text>
  <text x="685" y="379" font-family="Arial, sans-serif" font-size="11" fill="#81c784" text-anchor="middle">No Data Leaves Machine</text>
</svg>
