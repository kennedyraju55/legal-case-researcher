<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a574"/>
      <stop offset="50%" style="stop-color:#e8c89e"/>
      <stop offset="100%" style="stop-color:#d4a574"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>
  <rect x="20" y="20" width="760" height="160" rx="8" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>
  <!-- Scale icon -->
  <text x="170" y="115" font-size="60" fill="url(#gold)" text-anchor="middle" filter="url(#glow)">⚖️</text>
  <!-- Title -->
  <text x="420" y="90" font-family="Georgia, serif" font-size="38" fill="url(#gold)" text-anchor="middle" font-weight="bold" filter="url(#glow)">Legal Case Researcher</text>
  <!-- Subtitle -->
  <text x="420" y="125" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">AI-Powered Case Law Research with Complete Privacy</text>
  <!-- Privacy badge -->
  <rect x="300" y="140" width="240" height="28" rx="14" fill="#1b5e20" opacity="0.8"/>
  <text x="420" y="159" font-family="Arial, sans-serif" font-size="12" fill="#81c784" text-anchor="middle">🔒 100% Local • Zero Data Leakage</text>
  <!-- Decorative corners -->
  <line x1="30" y1="30" x2="70" y2="30" stroke="#d4a574" stroke-width="2" opacity="0.6"/>
  <line x1="30" y1="30" x2="30" y2="70" stroke="#d4a574" stroke-width="2" opacity="0.6"/>
  <line x1="770" y1="170" x2="730" y2="170" stroke="#d4a574" stroke-width="2" opacity="0.6"/>
  <line x1="770" y1="170" x2="770" y2="130" stroke="#d4a574" stroke-width="2" opacity="0.6"/>
</svg>
