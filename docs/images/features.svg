<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#bg)" rx="12"/>
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="18" fill="#d4a574" text-anchor="middle" font-weight="bold">Features</text>

  <!-- Row 1 -->
  <!-- Case Research -->
  <rect x="30" y="55" width="230" height="120" rx="10" fill="rgba(255,255,255,0.05)" stroke="#1565c0" stroke-width="1.5"/>
  <text x="145" y="85" font-family="Arial, sans-serif" font-size="24" fill="#42a5f5" text-anchor="middle">🔍</text>
  <text x="145" y="110" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Case Research</text>
  <text x="145" y="130" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Research case law across</text>
  <text x="145" y="145" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">jurisdictions with AI analysis</text>

  <!-- Precedent Finder -->
  <rect x="285" y="55" width="230" height="120" rx="10" fill="rgba(255,255,255,0.05)" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="400" y="85" font-family="Arial, sans-serif" font-size="24" fill="#ab47bc" text-anchor="middle">📚</text>
  <text x="400" y="110" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Precedent Finder</text>
  <text x="400" y="130" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Find relevant precedents</text>
  <text x="400" y="145" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">with relevance scoring</text>

  <!-- Argument Analysis -->
  <rect x="540" y="55" width="230" height="120" rx="10" fill="rgba(255,255,255,0.05)" stroke="#e65100" stroke-width="1.5"/>
  <text x="655" y="85" font-family="Arial, sans-serif" font-size="24" fill="#ff9800" text-anchor="middle">📋</text>
  <text x="655" y="110" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Argument Analysis</text>
  <text x="655" y="130" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Evaluate argument strength</text>
  <text x="655" y="145" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">and identify weaknesses</text>

  <!-- Row 2 -->
  <!-- Citation Extraction -->
  <rect x="30" y="195" width="230" height="120" rx="10" fill="rgba(255,255,255,0.05)" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="145" y="225" font-family="Arial, sans-serif" font-size="24" fill="#4caf50" text-anchor="middle">📎</text>
  <text x="145" y="250" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Citation Extraction</text>
  <text x="145" y="270" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Extract and parse legal</text>
  <text x="145" y="285" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">citations from documents</text>

  <!-- Case Summarization -->
  <rect x="285" y="195" width="230" height="120" rx="10" fill="rgba(255,255,255,0.05)" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="400" y="225" font-family="Arial, sans-serif" font-size="24" fill="#ef5350" text-anchor="middle">📄</text>
  <text x="400" y="250" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Case Summarization</text>
  <text x="400" y="270" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Summarize case documents</text>
  <text x="400" y="285" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">into structured briefs</text>

  <!-- 100% Private -->
  <rect x="540" y="195" width="230" height="120" rx="10" fill="rgba(27,94,32,0.2)" stroke="#4caf50" stroke-width="2"/>
  <text x="655" y="225" font-family="Arial, sans-serif" font-size="24" fill="#4caf50" text-anchor="middle">🔒</text>
  <text x="655" y="250" font-family="Arial, sans-serif" font-size="14" fill="#4caf50" text-anchor="middle" font-weight="bold">100% Private</text>
  <text x="655" y="270" font-family="Arial, sans-serif" font-size="11" fill="#81c784" text-anchor="middle">All processing stays local</text>
  <text x="655" y="285" font-family="Arial, sans-serif" font-size="11" fill="#81c784" text-anchor="middle">Attorney-client privilege safe</text>
</svg>
